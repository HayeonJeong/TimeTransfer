<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Zone Converter - Compare World Time Zones | TimeTransfer</title>
  <meta name="description" content="Free time zone converter. Compare time between any two cities worldwide. Interactive 24-hour weekly grid with instant time zone conversion." />

  <!-- Open Graph -->
  <meta property="og:title" content="Time Zone Converter - Compare World Time Zones" />
  <meta property="og:description" content="Compare time between any two cities worldwide. Interactive 24-hour weekly grid with instant time zone conversion." />

  <link rel="stylesheet" href="styles.css" />

<body>
  <header>
    <h1>🌐 TimeTransfer</h1>
    <p class="subtitle">두 도시의 시간대를 나란히 비교해보세요</p>
  </header>

  <!-- Top Ad Banner -->
  <div class="ad-container ad-top">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-5049094894333450"
         data-ad-slot="1234567890"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <main>
    <!-- City 1 Section -->
    <section class="city-section" id="section-city1">
      <div class="city-selector">
        <label for="city1-input">도시 1</label>
        <div class="search-wrapper">
          <input type="text" id="city1-input" placeholder="도시 검색 (예: Seoul, New York...)" autocomplete="off" />
          <ul class="dropdown" id="city1-dropdown"></ul>
        </div>
        <span class="tz-label" id="city1-tz"></span>
      </div>
      <div class="table-wrapper">
        <table class="time-table" id="table-city1" data-city-index="1">
          <thead>
            <tr>
              <th class="day-header"></th>
              <!-- Hours 0-23 generated by JS -->
            </tr>
          </thead>
          <tbody>
            <!-- Rows generated by JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Middle Ad -->
    <div class="ad-container ad-middle">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-5049094894333450"
           data-ad-slot="0987654321"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- City 2 Section -->
    <section class="city-section" id="section-city2">
      <div class="city-selector">
        <label for="city2-input">도시 2</label>
        <div class="search-wrapper">
          <input type="text" id="city2-input" placeholder="도시 검색 (예: London, Tokyo...)" autocomplete="off" />
          <ul class="dropdown" id="city2-dropdown"></ul>
        </div>
        <span class="tz-label" id="city2-tz"></span>
      </div>
      <div class="table-wrapper">
        <table class="time-table" id="table-city2" data-city-index="2">
          <thead>
            <tr>
              <th class="day-header"></th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Info Panel -->
    <div class="info-panel" id="info-panel">
      <span id="info-text">도시를 선택한 후 표에 마우스를 올려보세요</span>

    <ins class="adsbygoogle"
